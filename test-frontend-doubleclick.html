<!DOCTYPE html>
<html>
<head>
  <title>Double-Click Test</title>
</head>
<body>
  <h1>Testing Double-Click Prevention</h1>
  <button id="testBtn">Test Rapid Clicks</button>
  <div id="result"></div>

  <script>
    const btn = document.getElementById('testBtn');
    const resultDiv = document.getElementById('result');

    btn.addEventListener('click', async () => {
      resultDiv.innerHTML = 'Testing...';

      // Count projects before
      const beforeResp = await fetch('http://localhost:5000/api/projects');
      const beforeData = await beforeResp.json();
      const beforeCount = beforeData.projects.length;

      // Navigate to the app in iframe to test
      const iframe = document.createElement('iframe');
      iframe.src = 'http://localhost:5173';
      iframe.style.width = '800px';
      iframe.style.height = '600px';
      document.body.appendChild(iframe);

      await new Promise(resolve => setTimeout(resolve, 2000));

      // Access the iframe's button and click it multiple times
      try {
        const iframeDoc = iframe.contentWindow.document;
        const newProjectBtn = Array.from(iframeDoc.querySelectorAll('button'))
          .find(b => b.textContent.includes('New Project'));

        if (newProjectBtn) {
          newProjectBtn.click();
          await new Promise(resolve => setTimeout(resolve, 500));

          const modal = iframeDoc.querySelector('[role="dialog"]') || iframeDoc.querySelector('form');
          const input = iframeDoc.querySelector('input[type="text"]');
          if (input) {
            input.value = `Rapid Click Test ${Date.now()}`;
            input.dispatchEvent(new Event('input', { bubbles: true }));

            await new Promise(resolve => setTimeout(resolve, 200));

            const createBtn = Array.from(iframeDoc.querySelectorAll('button'))
              .find(b => b.textContent.includes('Create Project'));

            if (createBtn) {
              // Click 3 times rapidly
              createBtn.click();
              createBtn.click();
              createBtn.click();

              await new Promise(resolve => setTimeout(resolve, 3000));

              // Check final count
              const afterResp = await fetch('http://localhost:5000/api/projects');
              const afterData = await afterResp.json();
              const afterCount = afterData.projects.length;

              const created = afterCount - beforeCount;
              resultDiv.innerHTML = `
                <p>Before: ${beforeCount} projects</p>
                <p>After: ${afterCount} projects</p>
                <p>Created: ${created} project(s)</p>
                <p><strong>${created === 1 ? '✅ PASS' : '❌ FAIL'}</strong></p>
              `;
            }
          }
        }
      } catch (err) {
        resultDiv.innerHTML = `Error: ${err.message}`;
      }
    });
  </script>
</body>
</html>
